interface:
  display_name: "Posture Extractor"
  short_description: "Extract posture into transparent PNGs with bilingual prompt files"
  default_prompt: "Use $posture-extractor to extract the posture from this reference image. In Codex, default to the built-in conversation image generation/editing capability first; do not check OpenAI CLI parameters, shell API availability, or OPENAI_API_KEY before the first built-in image generation attempt. Use CLI/API fallback only after the Codex built-in path is unavailable, cannot access the required visual inputs, or has failed with repeated tool errors. Create a validated cutout transparent white-model posture PNG, and save a bilingual prompt Markdown file in the same directory. In Codex, after image generation, locate the generated raster under $CODEX_HOME/generated_images or ~/.codex/generated_images before post-processing. Deliver only after the target PNG exists on disk and passes RGBA, 1024x1024, alpha, and background-removal validation. Do not attach or present solid-background generations, uncut images, templates, checkerboard previews, conversation-only images, or other intermediate images unless explicitly requested for diagnostics. The final white-model head must be smooth and featureless, with no eyes, eyebrows, nose, mouth, lips, teeth, makeup, face markings, or expression details."

policy:
  allow_implicit_invocation: true
