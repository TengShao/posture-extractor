interface:
  display_name: "Posture Extractor"
  short_description: "Extract posture into transparent PNGs with bilingual prompt files"
  default_prompt: "Use $posture-extractor to extract the posture from this reference image. Use the available built-in image generation/editing capability first when needed, create a validated cutout transparent white-model posture PNG, and save a bilingual prompt Markdown file in the same directory. In Codex, after image generation, locate the generated raster under $CODEX_HOME/generated_images or ~/.codex/generated_images before post-processing. If the built-in/default generation path fails, cannot save a local raster, cannot use both the template and reference image as visual inputs, produces an invalid result, or the user is dissatisfied with the output quality, ask whether to retry with a configured third-party image generation API backend. Do not call paid or third-party APIs silently. If the user agrees but no backend credentials are configured, guide them to configure the required key, for example GEMINI_API_KEY for the Gemini adapter. Deliver only after the target PNG exists on disk and passes RGBA, 1024x1024, alpha, and background-removal validation. Do not attach or present solid-background generations, uncut images, templates, checkerboard previews, conversation-only images, or other intermediate images unless explicitly requested for diagnostics. The final white-model head must be smooth and featureless, with no eyes, eyebrows, nose, mouth, lips, teeth, makeup, face markings, or expression details."

policy:
  allow_implicit_invocation: true
